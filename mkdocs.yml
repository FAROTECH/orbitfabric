site_name: OrbitFabric
site_description: A model-first Mission Data Fabric for small spacecraft.
repo_name: orbitfabric

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Project:
      - Charter: PROJECT_CHARTER.md
      - Clean-Room Policy: CLEAN_ROOM_POLICY.md
      - Architecture: ARCHITECTURE.md
      - Roadmap: ROADMAP.md
      - Development Guide: DEVELOPMENT.md
  - Reference:
      - Mission Model v0.1: reference/mission-model-v0.1.md
  - ADR:
      - ADR-0001 Mission Model First: adr/ADR-0001-mission-model-first.md
      - ADR-0002 Python Toolchain First: adr/ADR-0002-python-toolchain-first.md
      - ADR-0003 YAML Multi-File Mission Model: adr/ADR-0003-yaml-multifile-mission-model.md
      - ADR-0004 No Flight Runtime in v0.1: adr/ADR-0004-no-flight-runtime-in-v0.1.md
      - ADR-0005 Lint as Core Feature: adr/ADR-0005-lint-as-core-feature.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight