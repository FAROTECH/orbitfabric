site_name: OrbitFabric
site_description: A model-first Mission Data Fabric for small spacecraft.
repo_name: orbitfabric

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Project:
      - Charter: PROJECT_CHARTER.md
      - Clean-Room Policy: CLEAN_ROOM_POLICY.md
      - Architecture: ARCHITECTURE.md
      - Roadmap: ROADMAP.md
      - Development Guide: DEVELOPMENT.md
      - Quickstart: QUICKSTART.md
      - Demo Walkthrough: DEMO_WALKTHROUGH.md
  - Reference:
      - Mission Model v0.1: reference/mission-model-v0.1.md
      - Versioning Model: reference/versioning.md
      - JSON Reports v0.1: reference/json-reports-v0.1.md
      - Lint Rules v0.1: reference/lint-rules-v0.1.md
      - Payload Contract Model: reference/payload-contract-model.md
      - Data Product Contract Model: reference/data-product-contract-model.md
  - Releases:
      - v0.2.2 Payload Contract Release Alignment: releases/v0.2.2.md
      - v0.3.0 Data Product and Storage Contracts: releases/v0.3.0.md
  - Communication:
      - Payload Contract Model Announcement: comms/payload-contract-model-announcement.md

  - ADR:
      - ADR-0001 Mission Model First: adr/ADR-0001-mission-model-first.md
      - ADR-0002 Python Toolchain First: adr/ADR-0002-python-toolchain-first.md
      - ADR-0003 YAML Multi-File Mission Model: adr/ADR-0003-yaml-multifile-mission-model.md
      - ADR-0004 No Flight Runtime in v0.1: adr/ADR-0004-no-flight-runtime-in-v0.1.md
      - ADR-0005 Lint as Core Feature: adr/ADR-0005-lint-as-core-feature.md
      - ADR-0006 Payload Contract Model: adr/ADR-0006-payload-contract-model.md
      - ADR-0007 Mission Data Chain Before Runtime: adr/ADR-0007-mission-data-chain-before-runtime.md
      - ADR-0008 Data Product and Storage Contracts: adr/ADR-0008-data-product-and-storage-contracts.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight