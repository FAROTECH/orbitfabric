commands:
- id: obc.request_health_telemetry
  target: obc
  description: Request current critical housekeeping and acquisition-readiness telemetry products.
  arguments: []
  allowed_modes:
  - NOMINAL
  - ACQUISITION_PREP
  - IMAGE_ACQUISITION
  - DATA_COMPRESSION
  - DOWNLINK
  - SAFE
  - FAULT_RECOVERY
  requires_ack: true
  timeout_ms: 500
  risk: low
  emits:
  - obc.health_telemetry_requested
  expected_effects:
    no_state_change: true
- id: payload.load_acquisition_params
  target: hyperspectral_payload
  description: Load conceptual acquisition parameters during a contact-oriented operation.
  arguments:
  - name: target_id
    type: string
    description: Abstract target identifier used only for public-demo scenario evidence.
  - name: exposure_ms
    type: uint16
    min: 1
    max: 60000
    default: 1000
    description: Conceptual exposure/integration setting for the acquisition.
  allowed_modes:
  - NOMINAL
  preconditions:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: READY
  requires_ack: true
  timeout_ms: 1000
  risk: medium
  emits:
  - payload.acquisition_params_loaded
  expected_effects:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: PARAMS_LOADED
    telemetry:
      payload.acquisition_status: PARAMS_LOADED
- id: payload.schedule_image_acquisition
  target: hyperspectral_payload
  description: Schedule a bounded hyperspectral image acquisition and enter acquisition-preparation mode.
  arguments:
  - name: acquisition_window_s
    type: uint16
    min: 1
    max: 900
    default: 120
    description: Conceptual bounded acquisition window.
  allowed_modes:
  - NOMINAL
  preconditions:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: PARAMS_LOADED
  requires_ack: true
  timeout_ms: 1000
  risk: medium
  emits:
  - payload.acquisition_scheduled
  expected_effects:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: SCHEDULED
    telemetry:
      payload.acquisition_status: SCHEDULED
    mode_transition:
      to: ACQUISITION_PREP
- id: adcs.request_pointing_ready
  target: adcs
  description: Request ADCS readiness for the scheduled image acquisition while the OBC is in acquisition-preparation mode.
  arguments: []
  allowed_modes:
  - ACQUISITION_PREP
  requires_ack: true
  timeout_ms: 1500
  risk: medium
  emits:
  - adcs.ready_for_acquisition
  expected_effects:
    telemetry:
      adcs.attitude_ready: true
      adcs.pointing_status: READY_FOR_ACQUISITION
      star_tracker.status: TRACKING
      sun_sensors.status: READY
  preconditions:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: SCHEDULED
- id: payload.prepare_camera
  target: hyperspectral_payload
  description: Prepare the hyperspectral camera for acquisition after ADCS readiness has been established.
  arguments: []
  allowed_modes:
  - ACQUISITION_PREP
  preconditions:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: SCHEDULED
  requires_ack: true
  timeout_ms: 1500
  risk: medium
  emits:
  - payload.camera_ready
  expected_effects:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: CAMERA_READY
    telemetry:
      payload.camera_status: READY
      payload.acquisition_status: CAMERA_READY
      payload.camera_temperature: 5.0
      thermal.payload_temperature: 5.0
- id: obc.verify_acquisition_conditions
  target: obc
  description: Verify the scheduled acquisition conditions before allowing image acquisition to start.
  arguments: []
  allowed_modes:
  - ACQUISITION_PREP
  preconditions:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: CAMERA_READY
  requires_ack: true
  timeout_ms: 1000
  risk: medium
  emits:
  - obc.acquisition_conditions_met
  expected_effects:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: CONDITIONS_VERIFIED
    telemetry:
      payload.acquisition_status: CONDITIONS_VERIFIED
      adcs.attitude_ready: true
      adcs.pointing_status: READY_FOR_ACQUISITION
      payload.camera_status: READY
- id: payload.start_image_acquisition
  target: hyperspectral_payload
  description: Start and complete a conceptual hyperspectral image acquisition after the OBC has verified acquisition conditions.
  arguments: []
  allowed_modes:
  - ACQUISITION_PREP
  preconditions:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: CONDITIONS_VERIFIED
  requires_ack: true
  timeout_ms: 2000
  risk: medium
  emits:
  - payload.image_acquisition_started
  - payload.image_acquisition_completed
  expected_effects:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: DATA_READY
    telemetry:
      payload.camera_status: DATA_READY
      payload.acquisition_status: COMPLETE
      adcs.pointing_status: DONE
      payload.data_generated_bytes: 120000
      data_storage.used_bytes: 120000
    mode_transition:
      to: IMAGE_ACQUISITION
- id: payload.compress_image_data
  target: payload_firmware
  description: Compress the acquired hyperspectral image into a downlink-eligible bundle after image acquisition completes.
  arguments: []
  allowed_modes:
  - IMAGE_ACQUISITION
  preconditions:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: DATA_READY
  requires_ack: true
  timeout_ms: 3000
  risk: medium
  emits:
  - payload.image_compressed
  expected_effects:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: COMPRESSED_READY
    telemetry:
      payload.camera_status: COMPRESSED_READY
      payload.compression_status: COMPLETE
      payload.data_pending_bytes: 48000
      data_storage.used_bytes: 168000
    mode_transition:
      to: DATA_COMPRESSION
- id: comms.set_downlink_priority
  target: comms
  description: Select the priority policy used by the constrained downlink flow.
  arguments:
  - name: policy
    type: enum
    enum:
    - critical_first
    - priority_then_age
    - manual_selection
    default: critical_first
    description: Abstract queue selection policy for the next downlink opportunity.
  allowed_modes:
  - NOMINAL
  - DATA_COMPRESSION
  - DOWNLINK
  requires_ack: true
  timeout_ms: 500
  risk: low
  emits:
  - comms.downlink_priority_set
  expected_effects:
    no_state_change: true
- id: comms.start_downlink
  target: comms
  description: Start the prioritized downlink flow for the current abstract contact window.
  arguments: []
  allowed_modes:
  - NOMINAL
  - DATA_COMPRESSION
  preconditions:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: COMPRESSED_READY
  requires_ack: true
  timeout_ms: 1500
  risk: medium
  emits:
  - comms.contact_window_started
  - comms.downlink_started
  - comms.downlink_partial
  - comms.downlink_capacity_insufficient
  - payload.image_data_pending
  expected_effects:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: DOWNLINK_PENDING
    telemetry:
      comms.link_status: DOWNLINK_ACTIVE
      rf.downlink_status: ACTIVE
      transceiver.status: TX_DOWNLINK
      downlink.capacity_remaining_bytes: 0
      payload.camera_status: DOWNLINK_PENDING
      payload.data_pending_bytes: 43264
    mode_transition:
      to: DOWNLINK
- id: comms.end_downlink
  target: comms
  description: Close the current contact window and record remaining pending compressed image data.
  arguments: []
  allowed_modes:
  - DOWNLINK
  preconditions:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: DOWNLINK_PENDING
  requires_ack: true
  timeout_ms: 1000
  risk: low
  emits:
  - comms.contact_window_ended
  expected_effects:
    payload_lifecycle:
      payload: hyperspectral_payload
      state: BACKLOG
    telemetry:
      comms.link_status: NO_CONTACT
      rf.downlink_status: PARTIAL
      transceiver.status: STANDBY
      payload.camera_status: BACKLOG
    mode_transition:
      to: NOMINAL
- id: obc.enter_safe_mode
  target: obc
  description: Request transition to safe mode.
  arguments: []
  allowed_modes:
  - NOMINAL
  - ACQUISITION_PREP
  - IMAGE_ACQUISITION
  - DATA_COMPRESSION
  - DOWNLINK
  - FAULT_RECOVERY
  requires_ack: true
  timeout_ms: 1000
  risk: high
  emits:
  - obc.safe_mode_requested
  expected_effects:
    telemetry:
      payload.camera_status: 'OFF'
    mode_transition:
      to: SAFE
- id: obc.clear_fault
  target: obc
  description: Clear a recorded warning or fault after ground review.
  arguments:
  - name: fault_id
    type: string
    description: Fault identifier to clear.
  allowed_modes:
  - SAFE
  - FAULT_RECOVERY
  requires_ack: true
  timeout_ms: 1000
  risk: low
  emits:
  - obc.fault_cleared
  expected_effects:
    no_state_change: true
